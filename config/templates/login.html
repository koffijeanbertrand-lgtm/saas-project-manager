{% extends 'base.html' %}

{% block title %}Connexion — eAgri{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 3rem auto;">
    <div class="card">
        <h2 style="margin-bottom: 1.5rem; text-align: center;">🌱 Connexion eAgri</h2>
        <form method="post">
            {% csrf_token %}
            <div style="margin-bottom: 1rem">
                <label>Email</label><br>
                <input type="email" name="username" style="width:100%; padding: 0.5rem; margin-top: 0.3rem; border: 1px solid #ddd; border-radius: 4px;">
            </div>
            <div style="margin-bottom: 1rem">
                <label>Mot de passe</label><br>
                <input type="password" name="password" style="width:100%; padding: 0.5rem; margin-top: 0.3rem; border: 1px solid #ddd; border-radius: 4px;">
            </div>
            {% if error %}
                <p style="color: red; margin-bottom: 1rem">{{ error }}</p>
            {% endif %}
            <button type="submit" class="btn" style="width: 100%; text-align: center; border: none; cursor: pointer; font-size: 1rem;">
                Se connecter
            </button>
        </form>
    </div>
</div>
{% endblock %}
